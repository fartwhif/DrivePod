<div class="min-h-screen bg-zinc-950 flex items-center justify-center p-4">
  <div class="w-full max-w-sm bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">📻</div>
      <h1 class="text-2xl font-bold text-white">DrivePod</h1>
      <p class="text-zinc-400 text-sm mt-1">Sign in to continue</p>
    </div>

    @if (error) {
      <div class="mb-4 bg-red-900/30 border border-red-700 text-red-300 px-4 py-3 rounded-xl text-sm">
        {{ error }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-zinc-400 text-sm mb-1">Username</label>
        <input type="text" [(ngModel)]="username"
               class="w-full bg-zinc-800 border border-zinc-600 rounded-xl px-4 py-2.5 text-white placeholder-zinc-500 focus:outline-none focus:border-green-500"
               placeholder="Username">
      </div>

      <div>
        <label class="block text-zinc-400 text-sm mb-1">Password</label>
        <input type="password" [(ngModel)]="password"
               class="w-full bg-zinc-800 border border-zinc-600 rounded-xl px-4 py-2.5 text-white placeholder-zinc-500 focus:outline-none focus:border-green-500"
               placeholder="Password">
      </div>

      <button type="submit" [disabled]="loading"
              class="w-full bg-green-600 hover:bg-green-500 disabled:opacity-50 text-white font-medium py-2.5 rounded-xl transition">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <div class="mt-6 text-center text-zinc-500 text-xs">
      <p>Demo: admin / demo123</p>
    </div>
  </div>
</div>
